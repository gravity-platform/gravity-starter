---
# Test Connectivity — Full Platform Health Check
# Checks infrastructure AND application-level functionality
#
# Usage:
#   ansible-playbook -i inventory/production.yml playbooks/test-connectivity.yml

- name: Test Connectivity — Full Platform Health Check
  hosts: all
  become: yes

  tasks:
    # ── Infrastructure ──────────────────────────────────────────
    - name: "[1/9] Check Docker is running"
      command: docker info
      register: docker_info
      ignore_errors: yes

    - name: "[2/9] Check container status"
      shell: |
        cd /opt/gravity
        docker compose ps --format '{{ '{{' }}.Name{{ '}}' }} {{ '{{' }}.State{{ '}}' }} {{ '{{' }}.Status{{ '}}' }}' 2>/dev/null || echo "FAILED"
      register: container_status
      ignore_errors: yes

    - name: "[3/9] Check for restarting containers"
      shell: |
        cd /opt/gravity
        docker compose ps --format '{{ '{{' }}.Name{{ '}}' }} {{ '{{' }}.State{{ '}}' }}' 2>/dev/null | grep -i restart || echo "NONE"
      register: restarting_containers
      ignore_errors: yes

    # ── Ports ───────────────────────────────────────────────────
    - name: "[4/9] Test internal service ports"
      wait_for:
        host: localhost
        port: "{{ item.port }}"
        timeout: 5
      loop:
        - { name: "Canvas", port: 3001 }
        - { name: "Server", port: 4100 }
        - { name: "Workflow", port: 4101 }
        - { name: "Node Service", port: 4102 }
        - { name: "MCP Server", port: 4103 }
      register: port_checks
      ignore_errors: yes

    # ── External Dependencies ───────────────────────────────────
    - name: "[5/9] Test Redis connectivity (external)"
      shell: |
        REDIS_HOST=$(grep '^REDIS_HOST=' /opt/gravity/.env 2>/dev/null | cut -d'=' -f2-)
        REDIS_PORT=$(grep '^REDIS_PORT=' /opt/gravity/.env 2>/dev/null | cut -d'=' -f2-)
        REDIS_HOST=${REDIS_HOST:-localhost}
        REDIS_PORT=${REDIS_PORT:-6379}
        echo "host=${REDIS_HOST} port=${REDIS_PORT}"
        timeout 5 bash -c "echo PING | nc -w 3 ${REDIS_HOST} ${REDIS_PORT}" >/dev/null 2>&1
      register: redis_check
      ignore_errors: yes

    - name: "[6/9] Test database connectivity"
      shell: |
        DB_URL=$(grep '^DATABASE_URL=' /opt/gravity/.env 2>/dev/null | cut -d'=' -f2-)
        if [ -z "$DB_URL" ]; then
          echo "DATABASE_URL not set"
          exit 1
        fi
        # Extract host:port from postgresql://user:pass@host:port/db
        DB_HOSTPORT=$(echo "$DB_URL" | sed -E 's|.*@([^/]+)/.*|\1|')
        DB_HOST=$(echo "$DB_HOSTPORT" | cut -d: -f1)
        DB_PORT=$(echo "$DB_HOSTPORT" | cut -d: -f2)
        echo "host=${DB_HOST} port=${DB_PORT}"
        timeout 5 bash -c "echo | nc -w 3 ${DB_HOST} ${DB_PORT}" >/dev/null 2>&1
      register: db_check
      ignore_errors: yes

    # ── Health Endpoints ────────────────────────────────────────
    - name: "[7/9] Test service health endpoints"
      uri:
        url: "http://localhost:{{ item.port }}/health"
        status_code: 200
        timeout: 5
      loop:
        - { name: "Server", port: 4100 }
        - { name: "Workflow", port: 4101 }
        - { name: "Node Service", port: 4102 }
        - { name: "MCP Server", port: 4103 }
      register: health_checks
      ignore_errors: yes

    # ── Application-Level Checks ────────────────────────────────
    - name: "[8/11] Test API endpoints (read)"
      shell: |
        RESPONSE=$(curl -s -w '\n%{http_code}' --max-time 10 http://localhost:{{ item.port }}{{ item.path }})
        STATUS=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | head -n -1)
        echo "HTTP $STATUS"
        [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]
      loop:
        - { name: "GET /api/workflows", port: 4100, path: "/api/workflows" }
        - { name: "GET /api/nodes", port: 4100, path: "/api/nodes" }
        - { name: "GET /api/prompt-blocks", port: 4100, path: "/api/prompt-blocks" }
      register: api_checks
      ignore_errors: yes

    - name: "[9/11] Test API write (POST workflow)"
      shell: |
        RESPONSE=$(curl -s -w '\n%{http_code}' --max-time 10 \
          -X POST http://localhost:4100/api/workflows \
          -H 'Content-Type: application/json' \
          -d '{"name":"_health_check_test","nodes":[],"edges":[]}')
        STATUS=$(echo "$RESPONSE" | tail -1)
        echo "HTTP $STATUS"
        [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]
      register: api_write_check
      ignore_errors: yes

    - name: "[10/11] Check for errors in service logs"
      shell: |
        cd /opt/gravity
        ERRORS=$(docker compose logs --tail=50 --since=5m 2>&1 | grep -iE 'error|fatal|panic|does not exist|ECONNREFUSED' | tail -10)
        if [ -n "$ERRORS" ]; then
          echo "$ERRORS"
          exit 1
        else
          echo "No recent errors"
        fi
      register: log_errors
      ignore_errors: yes

    # ── Caddy ───────────────────────────────────────────────────
    - name: "[11/11] Test external connectivity (if Caddy installed)"
      wait_for:
        host: localhost
        port: "{{ item }}"
        timeout: 5
      loop: [80, 443]
      register: caddy_ports
      ignore_errors: yes

  post_tasks:
    - name: "=== PLATFORM HEALTH CHECK ==="
      debug:
        msg: |
          ============================================
          PLATFORM HEALTH CHECK
          ============================================
          Host: {{ inventory_hostname }} ({{ ansible_host }})

          ── Infrastructure ──
          Docker: {{ 'OK' if docker_info.rc == 0 else 'FAILED' }}

          Containers:
          {% for line in container_status.stdout_lines %}
            {{ line }}
          {% endfor %}

          Restarting: {{ restarting_containers.stdout | trim }}

          ── Ports ──
          {% for result in port_checks.results %}
            - {{ result.item.name }} ({{ result.item.port }}): {{ 'OK' if not result.failed else 'CLOSED' }}
          {% endfor %}

          ── External Dependencies ──
          Redis: {{ 'REACHABLE' if redis_check.rc == 0 else 'UNREACHABLE' }}
            {{ redis_check.stdout_lines[0] | default('') }}
          Database: {{ 'REACHABLE' if db_check.rc == 0 else 'UNREACHABLE' }}
            {{ db_check.stdout_lines[0] | default('') }}

          ── Health Endpoints ──
          {% for result in health_checks.results %}
            - {{ result.item.name }}: {{ 'OK' if not result.failed else 'FAILED' }}
          {% endfor %}

          ── API Endpoints (read) ──
          {% for result in api_checks.results %}
            - {{ result.item.name }}: {{ result.stdout | default('???') if not result.failed else 'FAILED (' + result.stdout | default('???') + ')' }}
          {% endfor %}

          ── API Write Test ──
            - POST /api/workflows: {{ api_write_check.stdout | default('???') if not api_write_check.failed else 'FAILED (' + api_write_check.stdout | default('???') + ')' }}

          ── Recent Errors in Logs ──
          {{ log_errors.stdout | default('(skipped)') }}

          ── Caddy ──
            - Port 80: {{ 'OK' if not caddy_ports.results[0].failed else 'CLOSED' }}
            - Port 443: {{ 'OK' if not caddy_ports.results[1].failed else 'CLOSED' }}
          ============================================
